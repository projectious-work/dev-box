# =============================================================================
# Yazi theme — nord
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#88C0D0" }
hovered = { fg = "#2E3440", bg = "#D8DEE9" }
preview_hovered = { underline = true }
find_keyword = { fg = "#EBCB8B", bold = true }
find_position = { fg = "#B48EAD", italic = true }
marker_selected = { fg = "#A3BE8C", bg = "#A3BE8C" }
marker_copied = { fg = "#88C0D0", bg = "#88C0D0" }
marker_cut = { fg = "#BF616A", bg = "#BF616A" }

[tabs]
active = { fg = "#2E3440", bg = "#D8DEE9", bold = true }
inactive = { fg = "#4C566A", bg = "#3B4252" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#2E3440", bg = "#A3BE8C", bold = true }
normal_alt = { fg = "#A3BE8C", bg = "#3B4252", bold = true }
select_main = { fg = "#2E3440", bg = "#88C0D0", bold = true }
select_alt = { fg = "#88C0D0", bg = "#3B4252", bold = true }
unset_main = { fg = "#2E3440", bg = "#B48EAD", bold = true }
unset_alt = { fg = "#B48EAD", bg = "#3B4252", bold = true }

[status]
overall = { fg = "#D8DEE9", bg = "#3B4252" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#81A1C1" }
perm_read = { fg = "#EBCB8B" }
perm_write = { fg = "#BF616A" }
perm_exec = { fg = "#A3BE8C" }
perm_sep = { fg = "#4C566A" }
progress_label = { fg = "#D8DEE9", bold = true }
progress_normal = { fg = "#81A1C1", bg = "#3B4252" }
progress_error = { fg = "#BF616A", bg = "#3B4252" }

[input]
border = { fg = "#88C0D0" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#81A1C1" }
active = { fg = "#B48EAD" }
inactive = {}

[cmp]
border = { fg = "#81A1C1" }
active = { fg = "#B48EAD" }
inactive = {}

[tasks]
border = { fg = "#81A1C1" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#3B4252" }
cand = { fg = "#88C0D0" }
rest = { fg = "#4C566A" }
desc = { fg = "#B48EAD" }
separator = "  "
separator_style = { fg = "#434C5E" }

[help]
on = { fg = "#88C0D0" }
run = { fg = "#B48EAD" }
desc = {}
hovered = { bg = "#3B4252", bold = true }
footer = { fg = "#3B4252", bg = "#D8DEE9" }

[git]
modified = { fg = "#EBCB8B" }
untracked = { fg = "#B48EAD" }
added = { fg = "#A3BE8C" }
deleted = { fg = "#BF616A" }
updated = { fg = "#88C0D0" }
ignored = { fg = "#4C566A" }

[filetype]
rules = [
    { name = "*/", fg = "#81A1C1", bold = true },
    { name = "*.rs", fg = "#D08770" },
    { name = "*.py", fg = "#EBCB8B" },
    { name = "*.js", fg = "#EBCB8B" },
    { name = "*.ts", fg = "#81A1C1" },
    { name = "*.sh", fg = "#A3BE8C" },
    { name = "*.toml", fg = "#88C0D0" },
    { name = "*.yaml", fg = "#88C0D0" },
    { name = "*.yml", fg = "#88C0D0" },
    { name = "*.json", fg = "#88C0D0" },
    { name = "*.kdl", fg = "#88C0D0" },
    { name = "*.html", fg = "#D08770" },
    { name = "*.css", fg = "#81A1C1" },
    { name = "*.md", fg = "#D8DEE9" },
    { name = "*.tex", fg = "#A3BE8C" },
    { name = "*.typ", fg = "#A3BE8C" },
    { name = "*.pdf", fg = "#BF616A" },
    { name = "*.png", fg = "#B48EAD" },
    { name = "*.jpg", fg = "#B48EAD" },
    { name = "*.jpeg", fg = "#B48EAD" },
    { name = "*.gif", fg = "#B48EAD" },
    { name = "*.svg", fg = "#B48EAD" },
    { name = "*.zip", fg = "#D08770" },
    { name = "*.tar*", fg = "#D08770" },
    { name = "*.gz", fg = "#D08770" },
    { name = "*.gitignore", fg = "#4C566A" },
    { name = ".env*", fg = "#BF616A" },
    { name = "Dockerfile*", fg = "#81A1C1" },
    { name = "Makefile", fg = "#A3BE8C" },
    { name = "Cargo.toml", fg = "#D08770", bold = true },
    { name = "Cargo.lock", fg = "#4C566A" },
]
