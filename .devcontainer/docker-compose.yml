# Generated by aibox v0.13.1 — do not edit manually.
# To modify, edit aibox.toml and run: aibox sync
#
# =============================================================================
# HOW TO CUSTOMIZE:
#   Do NOT edit this file directly — it is regenerated by `aibox sync`.
#   To add ports:       set ports in aibox.toml [container], run `aibox sync`
#   To add volumes:     add [[container.extra_volumes]] entries in aibox.toml
#   To add env vars:    add keys under [container.environment] in aibox.toml
#   To change user:     set user in aibox.toml [container], run `aibox sync`
#
# VOLUME MOUNT STRATEGY:
#   Config files (vim, zellij, yazi, git, AI tools) are mounted read-write from
#   the host-side .aibox-home/ directory so changes persist across rebuilds.
#   The workspace (project root) is mounted at /workspace inside the container.
#   SSH keys are mounted read-only for security.
# =============================================================================
#
services:
  aibox-devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibox-devcontainer
    hostname: aibox
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      # Workspace (project root)
      - ${WORKSPACE_DIR:-..}:/workspace
      # SSH keys (read-only — mount from host)
      - ../.aibox-home/.ssh:/home/aibox/.ssh:ro
      # Vim configuration (vimrc + undo only — colorschemes stay from image)
      - ../.aibox-home/.vim/vimrc:/home/aibox/.vim/vimrc
      - ../.aibox-home/.vim/undo:/home/aibox/.vim/undo
      # Zellij terminal multiplexer config
      - ../.aibox-home/.config/zellij:/home/aibox/.config/zellij
      # Yazi file manager config
      - ../.aibox-home/.config/yazi:/home/aibox/.config/yazi
      # Git configuration
      - ../.aibox-home/.config/git:/home/aibox/.config/git
      # Claude Code configuration and memory
      - ../.aibox-home/.claude:/home/aibox/.claude
      # ALSA → PulseAudio bridge config
      - ../.aibox-home/.asoundrc:/home/aibox/.asoundrc
    # Environment variables injected from aibox.toml [container.environment]
    environment:
      AUDIODRIVER: "pulseaudio"
      COLORTERM: "truecolor"
      GIT_CONFIG_GLOBAL: "/home/aibox/.config/git/config"
      LANG: "en_US.UTF-8"
      PULSE_SERVER: "tcp:host.docker.internal:4714"
      TERM: "xterm-256color"
      TZ: "Europe/Berlin"
    command: sleep infinity