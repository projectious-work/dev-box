services:
  aibox-devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: localhost/aibox-devcontainer:latest
    container_name: aibox-devcontainer
    hostname: aibox
    stdin_open: true
    tty: true
    volumes:
      # ── Workspace ─────────────────────────────────────────────────────────
      - type: bind
        source: ${WORKSPACE_DIR:-..}
        target: /workspace

      # ── Persisted configuration (all live under .aibox-home/ on the host) ──
      # Paths are relative to the docker-compose.yml location (.devcontainer/),
      # so the default ../.aibox-home resolves to .aibox-home/ in the project root —
      # matching how WORKSPACE_DIR already uses .. as its default.
      # SSH keys — read-only; manage keys only on the host
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.ssh
        target: /home/aibox/.ssh
        read_only: true

      # Vim: config file + undo history + netrw bookmarks
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.vim
        target: /home/aibox/.vim

      # Zellij: config.kdl, themes/, layouts/, plugins cache
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.config/zellij
        target: /home/aibox/.config/zellij

      # Yazi: file manager config
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.config/yazi
        target: /home/aibox/.config/yazi

      # Git: global config + credentials helper store
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.config/git
        target: /home/aibox/.config/git

      # Claude: global config + memory
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.claude
        target: /home/aibox/.claude

      # Audio: PulseAudio config for Claude Code voice
      - type: bind
        source: ${HOST_ROOT:-../.aibox-home}/.asoundrc
        target: /home/aibox/.asoundrc

    environment:
      - PULSE_SERVER=tcp:host.docker.internal:4714
      - AUDIODRIVER=pulseaudio
      - TZ=Europe/Berlin
      - LANG=en_US.UTF-8
      - COLORTERM=truecolor
      - TERM=xterm-256color
      # Tell git to look for its config in XDG location (matches mount above)
      - GIT_CONFIG_GLOBAL=/home/aibox/.config/git/config
    working_dir: /workspace

  # ── E2E Test Companion Container ───────────────────────────────────────────
  # Simulates a user's host machine for end-to-end testing of the aibox CLI.
  # No shared volumes — the test harness SCPs the aibox binary + addons into
  # the companion, making it a realistic simulation of a user's host machine.
  # Accessible from aibox-devcontainer via: ssh -i /workspace/.devcontainer/ssh-e2e/id_ed25519 testuser@aibox-e2e-testrunner
  aibox-e2e-testrunner:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: aibox-e2e-testrunner
    hostname: aibox-e2e-testrunner
    # Podman rootless inside a container needs:
    #   seccomp=unconfined  — allows syscalls used by user-namespace creation
    #   SYS_ADMIN           — allows newuidmap to write /proc/PID/uid_map
    # Safe here because the container has NO host mounts, NO host network,
    # and NO exposed ports — the capability is scoped to its own namespaces.
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    tmpfs:
      - /tmp
      - /run

volumes: {}
