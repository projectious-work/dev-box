# Basic aibox.toml fixture for E2E testing
[aibox]
version = "0.12.0"
base = "debian"

[container]
name = "e2e-basic"
hostname = "e2e-basic"

[ai]
harnesses = ["claude"]

[audio]
enabled = false

[context]
packages = ["managed"]

[customization]
theme = "gruvbox-dark"
prompt = "default"
layout = "dev"
