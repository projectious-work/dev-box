# aibox.toml fixture with python addon for E2E testing
[aibox]
version = "0.12.0"
base = "debian"

[container]
name = "e2e-python"
hostname = "e2e-python"

[ai]
harnesses = ["claude"]

[audio]
enabled = false

[context]
packages = ["managed"]

[customization]
theme = "gruvbox-dark"
prompt = "default"
layout = "dev"

[addons.python.tools]
python = { version = "3.13" }
uv = { version = "0.7" }
