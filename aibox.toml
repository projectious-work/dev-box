# aibox.toml — dogfooding: this project uses its own CLI (from releases)

[aibox]
version = "0.13.1"
base = "debian"

[container]
name = "aibox-devcontainer"
hostname = "aibox"
user = "aibox"
keepalive = true
extra_packages = []

[process]
packages = ["full-product", "handover"]

[skills]
include = ["rust-conventions", "concurrency-patterns"]

[context]
schema_version = "1.0.0"

[ai]
providers = ["claude"]

[appearance]
theme = "projectious"

[audio]
enabled = true
pulse_server = "tcp:host.docker.internal:4714"

[addons]
# Note: Rust is installed in Dockerfile.local (not via addon) because:
# (1) the addon builder has a HOME path bug (COPY from /home/aibox but builder installs to /root)
# (2) we need the x86_64-unknown-linux-gnu cross-compilation target
python = { tools = {} }
node = { tools = {} }
docs-docusaurus = { tools = {} }
