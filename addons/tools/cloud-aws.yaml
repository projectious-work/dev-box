name: cloud-aws
version: "1.0.0"
builder_weight: null

tools:
  - name: aws-cli
    default_enabled: true
    default_version: ""
    supported_versions: []

builder: null

runtime: |
  # Addon: cloud-aws
  RUN ARCH="$(uname -m)" && \
      curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${ARCH}.zip" -o /tmp/awscli.zip && \
      unzip -q /tmp/awscli.zip -d /tmp && \
      /tmp/aws/install && \
      rm -rf /tmp/aws /tmp/awscli.zip
