name: kubernetes
version: "1.0.0"
builder_weight: "medium"

skills:
  - kubernetes-basics
  - container-orchestration

tools:
  - name: kubectl
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: helm
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: kustomize
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: k9s
    default_enabled: false
    default_version: ""
    supported_versions: []

builder: |
  # ── Kubernetes builder ────────────────────────────────────────────────
  FROM debian:trixie-slim AS k8s-builder

  ENV DEBIAN_FRONTEND=noninteractive

  RUN apt-get update && apt-get install -y --no-install-recommends \
      ca-certificates \
      curl \
      && rm -rf /var/lib/apt/lists/*

  RUN mkdir -p /build/bin && \
  {% if tools.kubectl.enabled %}
      ARCH="$(dpkg --print-architecture)" && \
      curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/${ARCH}/kubectl" -o /build/bin/kubectl && \
      chmod +x /build/bin/kubectl{% if tools.helm.enabled or tools.kustomize.enabled or tools.k9s.enabled %} && \
  {% endif %}
  {% endif %}
  {% if tools.helm.enabled %}
      HELM_VERSION="3.17.2" && \
      ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')" && \
      curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-${ARCH}.tar.gz" -o /tmp/helm.tar.gz && \
      curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-${ARCH}.tar.gz.sha256sum" -o /tmp/helm.tar.gz.sha256sum && \
      sha256sum -c /tmp/helm.tar.gz.sha256sum && \
      tar -xz --strip-components=1 -C /build/bin -f /tmp/helm.tar.gz "linux-${ARCH}/helm" && \
      rm /tmp/helm.tar.gz /tmp/helm.tar.gz.sha256sum{% if tools.kustomize.enabled or tools.k9s.enabled %} && \
  {% endif %}
  {% endif %}
  {% if tools.kustomize.enabled %}
      KUSTOMIZE_VERSION="5.6.0" && \
      ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')" && \
      curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_${ARCH}.tar.gz" -o /tmp/kustomize.tar.gz && \
      curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/checksums.txt" -o /tmp/kustomize.checksums.txt && \
      grep "kustomize_${KUSTOMIZE_VERSION}_linux_${ARCH}.tar.gz" /tmp/kustomize.checksums.txt | sha256sum -c && \
      tar -xz -C /build/bin -f /tmp/kustomize.tar.gz kustomize && \
      rm /tmp/kustomize.tar.gz /tmp/kustomize.checksums.txt{% if tools.k9s.enabled %} && \
  {% endif %}
  {% endif %}
  {% if tools.k9s.enabled %}
      ARCH="$(dpkg --print-architecture)" && \
      curl -fsSL "https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_${ARCH}.tar.gz" | tar xz -C /build/bin k9s
  {% endif %}

runtime: |
  # Addon: kubernetes (runtime)
  {% if tools.kubectl.enabled %}
  COPY --from=k8s-builder /build/bin/kubectl /usr/local/bin/kubectl
  {% endif %}
  {% if tools.helm.enabled %}
  COPY --from=k8s-builder /build/bin/helm /usr/local/bin/helm
  {% endif %}
  {% if tools.kustomize.enabled %}
  COPY --from=k8s-builder /build/bin/kustomize /usr/local/bin/kustomize
  {% endif %}
  {% if tools.k9s.enabled %}
  COPY --from=k8s-builder /build/bin/k9s /usr/local/bin/k9s
  {% endif %}
