name: preview-enhanced
version: "1.0.0"
description: "ffmpeg, ImageMagick, Ghostscript"
builder_weight: "light"

tools:
  - name: ffmpeg
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: imagemagick
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: ghostscript
    default_enabled: true
    default_version: ""
    supported_versions: []

runtime: |
  # Addon: preview-enhanced — heavy preview tools (video thumbnails, EPS, image conversion)
  # The base image includes chafa, timg, poppler-utils, mupdf-tools, librsvg2-bin, and entr.
  # This addon adds ffmpeg (video), imagemagick (format conversion), and ghostscript (EPS).
  USER root
  RUN apt-get update && apt-get install -y --no-install-recommends \
  {% if tools.ffmpeg.enabled %}
      ffmpeg \
  {% endif %}
  {% if tools.imagemagick.enabled %}
      imagemagick \
  {% endif %}
  {% if tools.ghostscript.enabled %}
      ghostscript \
  {% endif %}
      && rm -rf /var/lib/apt/lists/*
