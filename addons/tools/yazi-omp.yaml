name: yazi-omp
version: "1.0.0"
description: "oh-my-posh for the omp.yazi header prompt"
builder_weight: null

tools:
  - name: oh-my-posh
    default_enabled: true
    default_version: ""
    supported_versions: []

runtime: |
  # Addon: yazi-omp — install oh-my-posh for the omp.yazi Yazi header plugin.
  RUN ARCH=$(uname -m) &&       OMP_ARCH=$(case "$ARCH" in x86_64) echo amd64;; aarch64) echo arm64;; *) echo "$ARCH";; esac) &&   {% if tools.oh-my-posh.version %}
      curl -fsSL "https://github.com/JanDeDobbeleer/oh-my-posh/releases/download/v{{ tools.oh-my-posh.version }}/posh-linux-${OMP_ARCH}" -o /usr/local/bin/oh-my-posh &&   {% else %}
      curl -fsSL "https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/posh-linux-${OMP_ARCH}" -o /usr/local/bin/oh-my-posh &&   {% endif %}
      chmod +x /usr/local/bin/oh-my-posh
