name: infrastructure
version: "1.0.0"
builder_weight: "medium"

skills:
  - terraform-basics

tools:
  - name: opentofu
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: ansible
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: packer
    default_enabled: true
    default_version: ""
    supported_versions: []

builder: |
  # ── Infrastructure builder ────────────────────────────────────────────
  FROM debian:trixie-slim AS infra-builder

  ENV DEBIAN_FRONTEND=noninteractive

  RUN apt-get update && apt-get install -y --no-install-recommends \
      ca-certificates \
      curl \
      unzip \
      && rm -rf /var/lib/apt/lists/*

  RUN mkdir -p /build/bin && \
  {% if tools.opentofu.enabled %}
      TOFU_VERSION="1.9.0" && \
      ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')" && \
      curl -fsSL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_${ARCH}.tar.gz" -o /tmp/tofu.tar.gz && \
      curl -fsSL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_SHA256SUMS" -o /tmp/tofu_SHA256SUMS && \
      grep "tofu_${TOFU_VERSION}_linux_${ARCH}.tar.gz" /tmp/tofu_SHA256SUMS | sha256sum -c && \
      tar -xz -C /build/bin -f /tmp/tofu.tar.gz tofu && \
      rm /tmp/tofu.tar.gz /tmp/tofu_SHA256SUMS{% if tools.packer.enabled %} && \
  {% endif %}
  {% endif %}
  {% if tools.packer.enabled %}
      ARCH="$(dpkg --print-architecture)" && \
      curl -fsSL "https://releases.hashicorp.com/packer/1.11.2/packer_1.11.2_linux_${ARCH}.zip" -o /tmp/packer.zip && \
      unzip -q /tmp/packer.zip -d /build/bin && rm /tmp/packer.zip
  {% endif %}

runtime: |
  # Addon: infrastructure (runtime)
  {% if tools.opentofu.enabled %}
  COPY --from=infra-builder /build/bin/tofu /usr/local/bin/tofu
  {% endif %}
  {% if tools.packer.enabled %}
  COPY --from=infra-builder /build/bin/packer /usr/local/bin/packer
  {% endif %}
  {% if tools.ansible.enabled %}
  RUN pip3 install --no-cache-dir ansible
  {% endif %}
