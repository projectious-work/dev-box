name: infrastructure
version: "1.0.0"
builder_weight: "medium"

tools:
  - name: opentofu
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: ansible
    default_enabled: true
    default_version: ""
    supported_versions: []
  - name: packer
    default_enabled: true
    default_version: ""
    supported_versions: []

builder: |
  # ── Infrastructure builder ────────────────────────────────────────────
  FROM debian:trixie-slim AS infra-builder

  ENV DEBIAN_FRONTEND=noninteractive

  RUN apt-get update && apt-get install -y --no-install-recommends \
      ca-certificates \
      curl \
      unzip \
      && rm -rf /var/lib/apt/lists/*

  RUN mkdir -p /build/bin && \
  {% if tools.opentofu.enabled %}
      curl -fsSL https://get.opentofu.org/install-opentofu.sh | sh -s -- --install-method standalone --install-path /build/bin{% if tools.packer.enabled %} && \
  {% endif %}
  {% endif %}
  {% if tools.packer.enabled %}
      ARCH="$(dpkg --print-architecture)" && \
      curl -fsSL "https://releases.hashicorp.com/packer/1.11.2/packer_1.11.2_linux_${ARCH}.zip" -o /tmp/packer.zip && \
      unzip -q /tmp/packer.zip -d /build/bin && rm /tmp/packer.zip
  {% endif %}

runtime: |
  # Addon: infrastructure (runtime)
  {% if tools.opentofu.enabled %}
  COPY --from=infra-builder /build/bin/tofu /usr/local/bin/tofu
  {% endif %}
  {% if tools.packer.enabled %}
  COPY --from=infra-builder /build/bin/packer /usr/local/bin/packer
  {% endif %}
  {% if tools.ansible.enabled %}
  RUN pip3 install --no-cache-dir ansible
  {% endif %}
