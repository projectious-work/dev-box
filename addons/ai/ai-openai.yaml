name: ai-openai
version: "1.1.0"
description: "OpenAI Codex CLI"
builder_weight: null

tools:
  - name: codex
    default_enabled: true
    default_version: ""
    supported_versions: []

builder: null

runtime: |
  # Addon: ai-openai
  # OpenAI Codex CLI: https://github.com/openai/codex
  # npm package: @openai/codex | Binary: codex | Config: ~/.codex/
  # Auth: OPENAI_API_KEY (or ChatGPT Plus/Pro/Team/Enterprise account)
  # To pin a version: set [addons.ai-openai.tools.codex] version in aibox.toml
  USER aibox
  {% if tools.codex.version %}
  RUN npm install -g @openai/codex@{{ tools.codex.version }}
  {% else %}
  RUN npm install -g @openai/codex
  {% endif %}
  USER root
