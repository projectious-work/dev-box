name: typst
version: "1.0.0"
description: "Typst – modern typesetting system"
builder_weight: null

skills:
  - documentation

tools:
  - name: typst
    default_enabled: true
    default_version: "0.14.2"
    supported_versions: ["0.13.1", "0.14.2"]

builder: null

runtime: |
  # Addon: typst (runtime)
  RUN apt-get update && apt-get install -y --no-install-recommends xz-utils \
      && rm -rf /var/lib/apt/lists/* \
      && ARCH=$(uname -m) \
      && curl -fsSL \
        "https://github.com/typst/typst/releases/download/v{{ tools.typst.version }}/typst-${ARCH}-unknown-linux-musl.tar.xz" \
        | tar -xJ --strip-components=1 -C /usr/local/bin \
          "typst-${ARCH}-unknown-linux-musl/typst" \
      && chmod +x /usr/local/bin/typst
