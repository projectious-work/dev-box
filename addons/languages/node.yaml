name: node
version: "1.0.0"
builder_weight: null

skills:
  - typescript-patterns
  - tailwind

tools:
  - name: node
    default_enabled: true
    default_version: "22"
    supported_versions: ["20", "22"]
  - name: pnpm
    default_enabled: true
    default_version: "10"
    supported_versions: ["9", "10"]
  - name: yarn
    default_enabled: false
    default_version: "4"
    supported_versions: ["4"]
  - name: bun
    default_enabled: false
    default_version: "1.2"
    supported_versions: ["1.2"]

builder: null

runtime: |
  # Addon: node (runtime)
  RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates curl gpg && \
      mkdir -p /etc/apt/keyrings && \
      curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg && \
      echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ tools.node.version }}.x nodistro main" > /etc/apt/sources.list.d/nodesource.list && \
      apt-get update && apt-get install -y --no-install-recommends nodejs && \
      rm -rf /var/lib/apt/lists/*

  {% if tools.pnpm.enabled or tools.yarn.enabled %}
  RUN npm install -g{% if tools.pnpm.enabled %} pnpm@{{ tools.pnpm.version }}{% endif %}{% if tools.yarn.enabled %} yarn@{{ tools.yarn.version }}{% endif %}

  {% endif %}
  {% if tools.bun.enabled %}
  # Install bun via versioned release asset (avoids curl-pipe-bash).
  # Note: bun releases do not publish separate sha256 checksum files; version
  # pinning provides supply-chain integrity over the previous curl-pipe-bash method.
  RUN apt-get update && apt-get install -y --no-install-recommends unzip && \
      rm -rf /var/lib/apt/lists/* && \
      ARCH="$(uname -m | sed 's/x86_64/x64/;s/aarch64/aarch64/')" && \
      curl -fsSL "https://github.com/oven-sh/bun/releases/download/bun-v{{ tools.bun.version }}/bun-linux-${ARCH}.zip" -o /tmp/bun.zip && \
      unzip -q /tmp/bun.zip -d /tmp/bun-extracted && \
      mv /tmp/bun-extracted/bun-linux-${ARCH}/bun /usr/local/bin/bun && \
      chmod +x /usr/local/bin/bun && \
      rm -rf /tmp/bun.zip /tmp/bun-extracted
  {% endif %}
