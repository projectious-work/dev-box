# =============================================================================
# Yazi configuration — dev-box defaults
# Docs: https://yazi-rs.github.io/docs/configuration/yazi
# =============================================================================

[manager]
ratio = [1, 3, 4]           # parent : current : preview
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = true
show_symlink = true

[preview]
max_width = 600
max_height = 900
image_delay = 100

[opener]
# Enter: open in vim in-place (suspends yazi, returns on :q)
edit = [
    { run = '${EDITOR:-vim} "$@"', desc = "Edit in-place", block = true },
]
# For opening in the adjacent vim pane (dev layout: vim is right of yazi)
edit-pane = [
    { run = 'open-in-editor "$1"', desc = "Open in vim pane", block = false },
]

[open]
rules = [
    { name = "*/", use = "edit" },
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/toml", use = "edit" },
    { mime = "application/x-yaml", use = "edit" },
    { mime = "application/xml", use = "edit" },
    { mime = "application/x-sh", use = "edit" },
    { mime = "application/x-shellscript", use = "edit" },
    { mime = "inode/x-empty", use = "edit" },
    { name = "*.md", use = "edit" },
    { name = "*.rs", use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.kdl", use = "edit" },
    { name = "*.py", use = "edit" },
    { name = "*.sh", use = "edit" },
    { name = "*.yml", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.json", use = "edit" },
    { name = "*.tex", use = "edit" },
    { name = "*.typ", use = "edit" },
    { name = "*.html", use = "edit" },
    { name = "*.css", use = "edit" },
    { name = "*.js", use = "edit" },
    { name = "*.ts", use = "edit" },
    { name = "*", use = "edit" },
]
