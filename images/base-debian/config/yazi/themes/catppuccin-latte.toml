# =============================================================================
# Yazi theme — catppuccin latte
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#1E66F5" }
hovered = { fg = "#EFF1F5", bg = "#4C4F69" }
preview_hovered = { underline = true }
find_keyword = { fg = "#DF8E1D", bold = true }
find_position = { fg = "#EA76CB", italic = true }
marker_selected = { fg = "#40A02B", bg = "#40A02B" }
marker_copied = { fg = "#1E66F5", bg = "#1E66F5" }
marker_cut = { fg = "#D20F39", bg = "#D20F39" }

[tabs]
active = { fg = "#EFF1F5", bg = "#4C4F69", bold = true }
inactive = { fg = "#5C5F77", bg = "#CCD0DA" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#EFF1F5", bg = "#40A02B", bold = true }
normal_alt = { fg = "#1E1E2E", bg = "#CCD0DA", bold = true }
select_main = { fg = "#EFF1F5", bg = "#1E66F5", bold = true }
select_alt = { fg = "#1E1E2E", bg = "#CCD0DA", bold = true }
unset_main = { fg = "#EFF1F5", bg = "#EA76CB", bold = true }
unset_alt = { fg = "#8839EF", bg = "#CCD0DA", bold = true }

[status]
overall = { fg = "#4C4F69", bg = "#CCD0DA" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#1E66F5" }
perm_read = { fg = "#DF8E1D" }
perm_write = { fg = "#D20F39" }
perm_exec = { fg = "#40A02B" }
perm_sep = { fg = "#9CA0B0" }
progress_label = { fg = "#4C4F69", bold = true }
progress_normal = { fg = "#1E66F5", bg = "#CCD0DA" }
progress_error = { fg = "#D20F39", bg = "#CCD0DA" }

[input]
border = { fg = "#1E66F5" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#1E66F5" }
active = { fg = "#EA76CB" }
inactive = {}

[cmp]
border = { fg = "#1E66F5" }
active = { fg = "#EA76CB" }
inactive = {}

[tasks]
border = { fg = "#1E66F5" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#CCD0DA" }
cand = { fg = "#179299" }
rest = { fg = "#9CA0B0" }
desc = { fg = "#EA76CB" }
separator = "  "
separator_style = { fg = "#BCC0CC" }

[help]
on = { fg = "#179299" }
run = { fg = "#EA76CB" }
desc = {}
hovered = { bg = "#CCD0DA", bold = true }
footer = { fg = "#CCD0DA", bg = "#4C4F69" }

[git]
modified = { fg = "#DF8E1D" }
untracked = { fg = "#EA76CB" }
added = { fg = "#40A02B" }
deleted = { fg = "#D20F39" }
updated = { fg = "#1E66F5" }
ignored = { fg = "#9CA0B0" }

[filetype]
rules = [
    { name = "*/", fg = "#1E66F5", bold = true },
    { name = "*.rs", fg = "#FE640B" },
    { name = "*.py", fg = "#DF8E1D" },
    { name = "*.js", fg = "#DF8E1D" },
    { name = "*.ts", fg = "#1E66F5" },
    { name = "*.sh", fg = "#40A02B" },
    { name = "*.toml", fg = "#179299" },
    { name = "*.yaml", fg = "#179299" },
    { name = "*.yml", fg = "#179299" },
    { name = "*.json", fg = "#179299" },
    { name = "*.kdl", fg = "#179299" },
    { name = "*.html", fg = "#FE640B" },
    { name = "*.css", fg = "#1E66F5" },
    { name = "*.md", fg = "#4C4F69" },
    { name = "*.tex", fg = "#40A02B" },
    { name = "*.typ", fg = "#40A02B" },
    { name = "*.pdf", fg = "#D20F39" },
    { name = "*.png", fg = "#EA76CB" },
    { name = "*.jpg", fg = "#EA76CB" },
    { name = "*.jpeg", fg = "#EA76CB" },
    { name = "*.gif", fg = "#EA76CB" },
    { name = "*.svg", fg = "#EA76CB" },
    { name = "*.zip", fg = "#FE640B" },
    { name = "*.tar*", fg = "#FE640B" },
    { name = "*.gz", fg = "#FE640B" },
    { name = "*.gitignore", fg = "#9CA0B0" },
    { name = ".env*", fg = "#D20F39" },
    { name = "Dockerfile*", fg = "#1E66F5" },
    { name = "Makefile", fg = "#40A02B" },
    { name = "Cargo.toml", fg = "#FE640B", bold = true },
    { name = "Cargo.lock", fg = "#9CA0B0" },
]
