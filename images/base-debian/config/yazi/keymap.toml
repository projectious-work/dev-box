# =============================================================================
# Yazi keymap — dev-box defaults
# Docs: https://yazi-rs.github.io/docs/configuration/keymap
# =============================================================================

[manager]
prepend_keymap = [
    # Enter: open in vim in-place (suspends yazi, :q returns)
    { on = "<Enter>", run = "open",              desc = "Edit in-place" },
    # e: open in the adjacent vim pane (stays in yazi)
    { on = "e",       run = "shell 'open-in-editor \"$0\"' --confirm", desc = "Open in vim pane" },
    # O: interactive opener selection
    { on = "O",       run = "open --interactive", desc = "Open interactively" },
]
