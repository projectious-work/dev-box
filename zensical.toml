[project]

site_name = "dev-box v0.8.0"
site_description = "dev-box — manage AI-ready development container environments"
site_url = "https://projectious-work.github.io/dev-box/"

repo_url = "https://github.com/projectious-work/dev-box"
repo_name = "projectious-work/dev-box"

# Asciinema player for terminal screencasts
extra_css = ["assets/player/asciinema-player.css", "assets/player/asciinema-fonts.css", "assets/player/asciinema-themes.css"]
extra_javascript = ["assets/player/asciinema-player.min.js", "assets/player/asciinema-init.js"]

nav = [
  { Home = ["index.md"] },
  { "Getting Started" = [
    { Installation = "getting-started/installation.md" },
    { "New Project" = "getting-started/new-project.md" },
    { "Existing Project" = "getting-started/existing-project.md" },
    { Cheatsheet = "cheatsheet.md" },
  ] },
  { "Container Images" = [
    { "Base Image" = "container/base-image.md" },
    { "Image Flavors" = "container/flavors.md" },
    { "Audio Support" = "container/audio.md" },
  ] },
  { "Context System" = [
    { Overview = "context/overview.md" },
    { "Work Processes" = "context/work-processes.md" },
    { Migration = "context/migration.md" },
  ] },
  { Reference = [
    { Commands = "cli/commands.md" },
    { Configuration = "cli/configuration.md" },
    { Themes = "themes.md" },
    { "Skills Overview" = "skills/index.md" },
    { "Skills: Process" = "skills/process.md" },
    { "Skills: Development" = "skills/development.md" },
    { "Skills: Language" = "skills/language.md" },
    { "Skills: Infrastructure" = "skills/infrastructure.md" },
    { "Skills: Architecture" = "skills/architecture.md" },
    { "Skills: Design & Visual" = "skills/design.md" },
    { "Skills: Data & Analytics" = "skills/data.md" },
    { "Skills: AI & ML" = "skills/ai-ml.md" },
    { "Skills: API & Integration" = "skills/api.md" },
    { "Skills: Security" = "skills/security.md" },
    { "Skills: Observability" = "skills/observability.md" },
    { "Skills: Database" = "skills/database.md" },
    { "Skills: Performance" = "skills/performance.md" },
    { "Skills: Framework & SEO" = "skills/framework.md" },
  ] },
  { Contributing = [
    { Contributing = "contributing.md" },
    { Maintenance = "maintenance.md" },
  ] },
  { Roadmap = ["roadmap.md"] },
  { Changelog = ["changelog.md"] },
]

[project.theme]

language = "en"

features = [
  "content.code.copy",
  "content.code.annotate",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "toc.follow",
  "search.suggest",
  "search.highlight",
  "search.share",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
