<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; }
    .tab-name  { font-size: 11px; font-weight: 700; fill: #444; }
    .tab-num   { font-size: 10px; font-weight: 700; fill: #fff; }
    .badge     { fill: #6c757d; }
    .badge-act { fill: #4a6fa5; }
    .screen    { fill: #1e1e2e; rx: 4; }
    .panel     { fill: #2a2a3e; stroke: #4a4a6a; stroke-width: 1; }
    .panel-act { fill: #313244; stroke: #7c7caa; stroke-width: 1; }
    .sep       { stroke: #4a4a6a; stroke-width: 1.5; }
    .lbl       { font-size: 13px; font-weight: 700; fill: #cdd6f4; }
    .dim       { font-size: 10px; fill: #6c7086; }
  </style>

  <!-- ── Tab 1: dev (active) ─────────────────────────────── -->
  <circle cx="21" cy="14" r="9" class="badge-act"/>
  <text class="tab-num" x="21" y="18" text-anchor="middle">1</text>
  <text class="tab-name" x="35" y="18" fill="#4a6fa5">dev  ●</text>

  <rect x="10" y="26" width="212" height="164" rx="4" class="screen"/>
  <!-- yazi 40% -->
  <rect x="12" y="28" width="82" height="160" rx="2" class="panel-act"/>
  <text class="lbl" x="53" y="113" text-anchor="middle">yazi</text>
  <text class="dim" x="53" y="128" text-anchor="middle">40%</text>
  <!-- vim 60% -->
  <rect x="97" y="28" width="123" height="160" rx="2" class="panel"/>
  <text class="lbl" x="159" y="113" text-anchor="middle">vim</text>
  <text class="dim" x="159" y="128" text-anchor="middle">60%</text>

  <!-- ── Tab 2: claude ───────────────────────────────────── -->
  <circle cx="243" cy="14" r="9" class="badge"/>
  <text class="tab-num" x="243" y="18" text-anchor="middle">2</text>
  <text class="tab-name" x="257" y="18">claude</text>

  <rect x="232" y="26" width="212" height="164" rx="4" class="screen"/>
  <rect x="234" y="28" width="208" height="160" rx="2" class="panel"/>
  <text class="lbl" x="338" y="113" text-anchor="middle">claude</text>

  <!-- ── Tab 3: git ──────────────────────────────────────── -->
  <circle cx="465" cy="14" r="9" class="badge"/>
  <text class="tab-num" x="465" y="18" text-anchor="middle">3</text>
  <text class="tab-name" x="479" y="18">git</text>

  <rect x="454" y="26" width="212" height="164" rx="4" class="screen"/>
  <rect x="456" y="28" width="208" height="160" rx="2" class="panel"/>
  <text class="lbl" x="560" y="113" text-anchor="middle">lazygit</text>

  <!-- ── Tab 4: shell ────────────────────────────────────── -->
  <circle cx="687" cy="14" r="9" class="badge"/>
  <text class="tab-num" x="687" y="18" text-anchor="middle">4</text>
  <text class="tab-name" x="701" y="18">shell</text>

  <rect x="676" y="26" width="212" height="164" rx="4" class="screen"/>
  <rect x="678" y="28" width="208" height="160" rx="2" class="panel"/>
  <text class="lbl" x="782" y="113" text-anchor="middle">bash</text>
</svg>
