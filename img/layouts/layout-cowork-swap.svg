<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; }
    .tab-name  { font-size: 11px; font-weight: 700; fill: #444; }
    .tab-num   { font-size: 10px; font-weight: 700; fill: #fff; }
    .badge     { fill: #6c757d; }
    .badge-act { fill: #4a6fa5; }
    .screen    { fill: #1e1e2e; }
    .panel     { fill: #2a2a3e; stroke: #4a4a6a; stroke-width: 1; }
    .panel-act { fill: #313244; stroke: #7c7caa; stroke-width: 1; }
    .lbl       { font-size: 13px; font-weight: 700; fill: #cdd6f4; }
    .dim       { font-size: 10px; fill: #6c7086; }
  </style>

  <!-- 3 tabs: cowork-swap, git, shell — width = (900-4×10)/3 = 286px -->

  <!-- ── Tab 1: cowork-swap (active) ────────────────────────────── -->
  <!-- Left 40%: yazi top 40% / AI bottom 60%  |  Right 60%: vim -->
  <circle cx="19" cy="14" r="9" class="badge-act"/>
  <text class="tab-num" x="19" y="18" text-anchor="middle">1</text>
  <text class="tab-name" x="33" y="18" fill="#4a6fa5">cowork-swap  ●</text>

  <rect x="10" y="26" width="286" height="164" rx="4" class="screen"/>

  <!-- Left column 40% = 112px wide -->
  <!-- yazi top 40% of 160 = 62px -->
  <rect x="12" y="28" width="110" height="62" rx="2" class="panel-act"/>
  <text class="lbl" x="67" y="60" text-anchor="middle">yazi</text>
  <text class="dim" x="67" y="74" text-anchor="middle">top 40%</text>

  <!-- AI bottom 60% of 160 = 96px -->
  <rect x="12" y="92" width="110" height="96" rx="2" class="panel"/>
  <text class="lbl" x="67" y="136" text-anchor="middle">claude</text>
  <text class="dim" x="67" y="150" text-anchor="middle">bottom 60%</text>

  <!-- Right column 60% = vim -->
  <rect x="124" y="28" width="170" height="160" rx="2" class="panel"/>
  <text class="lbl" x="209" y="106" text-anchor="middle">vim</text>
  <text class="dim" x="209" y="121" text-anchor="middle">60%</text>

  <!-- ── Tab 2: git ──────────────────────────────────────────────── -->
  <circle cx="315" cy="14" r="9" class="badge"/>
  <text class="tab-num" x="315" y="18" text-anchor="middle">2</text>
  <text class="tab-name" x="329" y="18">git</text>
  <rect x="306" y="26" width="286" height="164" rx="4" class="screen"/>
  <rect x="308" y="28" width="282" height="160" rx="2" class="panel"/>
  <text class="lbl" x="449" y="113" text-anchor="middle">lazygit</text>

  <!-- ── Tab 3: shell ────────────────────────────────────────────── -->
  <circle cx="611" cy="14" r="9" class="badge"/>
  <text class="tab-num" x="611" y="18" text-anchor="middle">3</text>
  <text class="tab-name" x="625" y="18">shell</text>
  <rect x="602" y="26" width="286" height="164" rx="4" class="screen"/>
  <rect x="604" y="28" width="282" height="160" rx="2" class="panel"/>
  <text class="lbl" x="745" y="113" text-anchor="middle">bash</text>
</svg>
