site_name: "dev-box v0.7.0"
site_description: "dev-box — manage AI-ready development container environments"
site_url: https://projectious-work.github.io/dev-box/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home:
    - index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - New Project: getting-started/new-project.md
    - Existing Project: getting-started/existing-project.md
  - Container Images:
    - Base Image: container/base-image.md
    - Image Flavors: container/flavors.md
    - Audio Support: container/audio.md
  - Context System:
    - Overview: context/overview.md
    - Work Processes: context/work-processes.md
    - Skills: skills.md
    - Migration: context/migration.md
  - CLI Reference:
    - Commands: cli/commands.md
    - Configuration: cli/configuration.md
  - Cheatsheet:
    - cheatsheet.md
  - Themes:
    - themes.md
  - Contributing:
    - contributing.md
  - Maintenance:
    - maintenance.md
  - Roadmap:
    - roadmap.md
  - Changelog:
    - changelog.md
